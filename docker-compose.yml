# docker-compose.yml
version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - chroma-data:/app/chroma_data

  # Optional: Separate ChromaDB service
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-server-data:/chroma/chroma

volumes:
  chroma-data:
  chroma-server-data: