<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Document Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }

        /* ================================
           NAVBAR
        ================================ */
        .navbar {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            font-size: 1.1rem;
            font-weight: 600;
            color: #58a6ff;
        }

        .navbar-link {
            color: #8b949e;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .navbar-link:hover {
            color: #e1e4e8;
        }

        /* ================================
           MAIN LAYOUT
        ================================ */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* ================================
           CARDS
        ================================ */
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        /* ================================
           PASSWORD MODAL
        ================================ */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .password-input {
            width: 100%;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            color: #e1e4e8;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        /* ================================
           UPLOAD AREA
        ================================ */
        .upload-area {
            border: 2px dashed #30363d;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.05);
        }

        .upload-icon {
            font-size: 2rem;
            margin-bottom: 0.75rem;
        }

        .upload-text {
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        #fileInput {
            display: none;
        }

        .file-selected {
            display: none;
            align-items: center;
            justify-content: space-between;
            background: #21262d;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin-top: 1rem;
        }

        .file-selected.visible {
            display: flex;
        }

        /* ================================
           DOCUMENTS TABLE
        ================================ */
        .documents-table {
            width: 100%;
            border-collapse: collapse;
        }

        .documents-table th {
            text-align: left;
            padding: 0.75rem 0.5rem;
            color: #8b949e;
            font-weight: 500;
            font-size: 0.8rem;
            border-bottom: 1px solid #30363d;
        }

        .documents-table td {
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid #21262d;
            font-size: 0.85rem;
        }

        .delete-btn {
            background: #da3633;
            color: white;
            border: none;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .delete-btn:hover {
            background: #f85149;
        }

        /* ================================
           BUTTONS
        ================================ */
        .btn {
            padding: 0.6rem 1.25rem;
            border-radius: 6px;
            border: none;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #238636;
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #2ea043;
        }

        .btn-primary:disabled {
            background: #21262d;
            color: #484f58;
            cursor: not-allowed;
        }

        .btn-blue {
            background: #1f6feb;
            color: #ffffff;
        }

        .btn-blue:hover {
            background: #388bfd;
        }

        /* ================================
           STATUS
        ================================ */
        .status {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            margin-top: 1rem;
            display: none;
        }

        .status.visible {
            display: block;
        }

        .status.success {
            background: rgba(35, 134, 54, 0.15);
            border: 1px solid #238636;
            color: #3fb950;
        }

        .status.error {
            background: rgba(248, 81, 73, 0.15);
            border: 1px solid #f85149;
            color: #f85149;
        }

        .status.loading {
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid #1f6feb;
            color: #58a6ff;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .stats {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .stat-box {
            background: #21262d;
            padding: 1rem;
            border-radius: 8px;
            flex: 1;
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #58a6ff;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #8b949e;
            margin-top: 0.25rem;
        }

        .refresh-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #e1e4e8;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .refresh-btn:hover {
            background: #30363d;
        }
    </style>
</head>
<body>

    <!-- PASSWORD MODAL -->
    <div id="passwordModal" class="modal">
        <div class="modal-card">
            <div class="modal-title">🔐 Admin Access</div>
            <input type="password" id="adminPassword" class="password-input" placeholder="Enter admin password" onkeydown="if(event.key==='Enter') verifyPassword()">
            <button class="btn btn-blue" onclick="verifyPassword()" style="width: 100%;">Login</button>
            <div id="passwordError" style="color: #f85149; font-size: 0.8rem; margin-top: 0.75rem; text-align: center;"></div>
        </div>
    </div>

    <!-- MAIN CONTENT (hidden until login) -->
    <div id="mainContent" style="display: none;">
        <nav class="navbar">
            <span class="navbar-brand">🔐 Admin Panel</span>
            <a href="/" class="navbar-link">← Back to Chat</a>
        </nav>

        <div class="container">
            <!-- STATS CARD -->
            <div class="card">
                <div class="card-title">System Statistics</div>
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-number" id="totalDocs">0</div>
                        <div class="stat-label">Documents</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="totalChunks">0</div>
                        <div class="stat-label">Chunks</div>
                    </div>
                </div>
                <button class="refresh-btn" onclick="loadDocuments()" style="margin-top: 1rem;">⟳ Refresh</button>
            </div>

            <!-- UPLOAD CARD (Admin: No limits) -->
            <div class="card">
                <div class="card-title">Upload Document (Unlimited)</div>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">Click to select or drag and drop</div>
                    <div class="upload-text" style="font-size: 0.8rem; color: #3fb950;">✓ No size limits · All formats allowed</div>
                </div>
                <input type="file" id="fileInput" accept=".pdf,.txt,.docx">
                <div class="file-selected" id="fileSelected">
                    <div>
                        <div class="file-name" id="fileName"></div>
                        <div class="file-size" id="fileSize"></div>
                    </div>
                    <button class="btn btn-primary" id="uploadBtn" onclick="uploadFile()">Upload</button>
                </div>
                <div class="status" id="uploadStatus"></div>
            </div>

            <!-- DOCUMENTS LIST CARD -->
            <div class="card">
                <div class="card-title">Uploaded Documents</div>
                <div id="documentsList">
                    <div style="color: #8b949e; text-align: center; padding: 2rem;">Loading documents...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let adminPassword = "";

        // ================================
        // Password verification
        // ================================
        async function verifyPassword() {
            const pwdInput = document.getElementById("adminPassword");
            const password = pwdInput.value.trim();
            
            if (!password) return;

            document.getElementById("passwordError").textContent = "";

            try {
                const res = await fetch("/documents/", {
                    method: "GET",
                    headers: {
                        "x-admin-password": password
                    }
                });

                if (res.status === 200) {
                    // Password is correct
                    adminPassword = password;
                    document.getElementById("passwordModal").style.display = "none";
                    document.getElementById("mainContent").style.display = "block";
                    
                    // Store password for subsequent requests
                    window.adminPassword = password;
                    
                    // Load documents
                    loadDocuments();
                } else if (res.status === 401) {
                    document.getElementById("passwordError").textContent = "Invalid password";
                } else {
                    document.getElementById("passwordError").textContent = "Authentication failed";
                }
            } catch (err) {
                document.getElementById("passwordError").textContent = "Cannot connect to server";
            }
        }

        function getAuthHeaders() {
            return {
                "x-admin-password": window.adminPassword || adminPassword
            };
        }

        // ================================
        // Load documents
        // ================================
        async function loadDocuments() {
            try {
                const res = await fetch("/documents/", {
                    headers: getAuthHeaders()
                });

                if (res.status === 401) {
                    // Session expired, show password modal again
                    document.getElementById("passwordModal").style.display = "flex";
                    document.getElementById("mainContent").style.display = "none";
                    return;
                }

                if (!res.ok) throw new Error("Failed to load");

                const data = await res.json();
                
                // Update stats
                document.getElementById("totalDocs").textContent = data.total;
                
                // Calculate total chunks
                const totalChunks = data.documents.reduce((sum, doc) => sum + doc.chunks_count, 0);
                document.getElementById("totalChunks").textContent = totalChunks;

                // Render documents table
                const container = document.getElementById("documentsList");
                
                if (data.documents.length === 0) {
                    container.innerHTML = '<div style="color: #8b949e; text-align: center; padding: 2rem;">No documents uploaded yet</div>';
                    return;
                }

                let html = `
                    <table class="documents-table">
                        <thead>
                            <tr><th>Filename</th><th>Chunks</th><th>Uploaded</th><th></th></tr>
                        </thead>
                        <tbody>
                `;

                for (const doc of data.documents) {
                    html += `
                        <tr>
                            <td>📄 ${doc.filename}</td>
                            <td>${doc.chunks_count}</td>
                            <td>${doc.uploaded_at}</td>
                            <td><button class="delete-btn" onclick="deleteDocument('${doc.document_id}', '${doc.filename}')">Delete</button></td>
                        </tr>
                    `;
                }

                html += `</tbody></table>`;
                container.innerHTML = html;

            } catch (err) {
                console.error(err);
                document.getElementById("documentsList").innerHTML = '<div style="color: #f85149; text-align: center; padding: 2rem;">Failed to load documents</div>';
            }
        }

        // ================================
        // Delete document
        // ================================
        async function deleteDocument(docId, filename) {
            if (!confirm(`Delete "${filename}"? This cannot be undone.`)) return;

            try {
                const res = await fetch("http://localhost:8000/documents/upload", {
                    method: "DELETE",
                    headers: getAuthHeaders()
                });

                if (res.status === 401) {
                    document.getElementById("passwordModal").style.display = "flex";
                    document.getElementById("mainContent").style.display = "none";
                    return;
                }

                if (res.ok) {
                    showStatus("uploadStatus", "success", `✓ Deleted: ${filename}`);
                    loadDocuments(); // Refresh list
                } else {
                    const data = await res.json();
                    showStatus("uploadStatus", "error", `✗ ${data.detail}`);
                }
            } catch (err) {
                showStatus("uploadStatus", "error", "✗ Delete failed");
            }
        }

        // ================================
        // Upload logic (Admin - no limits)
        // ================================
        const uploadArea = document.getElementById("uploadArea");
        const fileInput = document.getElementById("fileInput");

        if (uploadArea) {
            uploadArea.addEventListener("click", () => fileInput.click());
            uploadArea.addEventListener("dragover", e => {
                e.preventDefault();
                uploadArea.classList.add("dragover");
            });
            uploadArea.addEventListener("dragleave", () => {
                uploadArea.classList.remove("dragover");
            });
            uploadArea.addEventListener("drop", e => {
                e.preventDefault();
                uploadArea.classList.remove("dragover");
                const file = e.dataTransfer.files[0];
                if (file) handleFileSelected(file);
            });
        }

        if (fileInput) {
            fileInput.addEventListener("change", () => {
                if (fileInput.files[0]) handleFileSelected(fileInput.files[0]);
            });
        }

        function handleFileSelected(file) {
            document.getElementById("fileName").textContent = file.name;
            document.getElementById("fileSize").textContent = formatBytes(file.size);
            document.getElementById("fileSelected").classList.add("visible");
            hideStatus("uploadStatus");
        }

        async function uploadFile() {
            const file = fileInput.files[0];
            if (!file) return;

            const btn = document.getElementById("uploadBtn");
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Uploading...';
            showStatus("uploadStatus", "loading", "Processing document...");

            const formData = new FormData();
            formData.append("files", file);

            try {
                const res = await fetch("/documents/upload", {
                    method: "POST",
                    headers: getAuthHeaders(),
                    body: formData
                });

                const data = await res.json();

                if (res.status === 401) {
                    document.getElementById("passwordModal").style.display = "flex";
                    document.getElementById("mainContent").style.display = "none";
                    return;
                }

                if (res.ok) {
                    showStatus("uploadStatus", "success", `✓ "${data.filename}" uploaded — ${data.chunks_created} chunks created`);
                    document.getElementById("fileSelected").classList.remove("visible");
                    fileInput.value = "";
                    loadDocuments(); // Refresh document list
                } else {
                    showStatus("uploadStatus", "error", `✗ ${data.detail}`);
                }

            } catch (err) {
                showStatus("uploadStatus", "error", "✗ Upload failed. Check your connection.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Upload";
            }
        }

        // ================================
        // Helpers
        // ================================
        function showStatus(id, type, message) {
            const el = document.getElementById(id);
            if (el) {
                el.className = `status ${type} visible`;
                el.textContent = message;
            }
        }

        function hideStatus(id) {
            const el = document.getElementById(id);
            if (el) el.className = "status";
        }

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + " B";
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
            return (bytes / (1024 * 1024)).toFixed(1) + " MB";
        }
    </script>
</body>
</html>
